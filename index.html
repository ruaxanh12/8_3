<script>
console.log("Script loaded");

const questions=[
{q:"Lần đầu tụi mình gặp nhau ở đâu?",a:["Hà Nội","Sài Gòn","Buôn Ma Thuột","Hông nhớ nữa"],correct:0},
{q:"Ai chủ động nhắn tin trước?",a:["Anh","Em","Cả hai","Không nhớ"],correct:1},
{q:"Ai hay giận dỗi hơn?",a:["Anh","Em","Cả hai","Một đứa hay ghẹo, một đứa hay quạo"],correct:1},
{q:"Ai đào hoa hơn?",a:["Anh","Em","Cả hai","Không, chúng tôi chung tình"],correct:1},
{q:"Anh thích ăn gì nhất?",a:["Steak cháy cạnh","Bánh bao nhân thịt mỡ","Ăn năn hối cải","Ăn em"],correct:3},
{q:"Màu anh thích em mặc nhất?",a:["Trắng","Đen","Hồng","Xanh"],correct:2},
{q:"Điều mà anh yêu nhất ở em?",a:["Mạnh mẽ","Dịu dàng","Giàu","Ngây thơ trong sáng, yêu anh trong tối"],correct:3},
{q:"Anh muốn đi cùng em bao lâu?",a:["Một thời gian","Vài năm","Trăm năm","Mãi mãi"],correct:3}
];

let current=0;

function showIntro(){
  console.log("Intro clicked");
  document.getElementById("start").classList.add("hidden");
  document.getElementById("intro").classList.remove("hidden");
}

function startGame(){
  console.log("Game started");
  document.getElementById("intro").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  const bg=document.getElementById("bgMusic");
  if(bg){
    bg.volume=0.05;
    bg.play().catch(()=>{});
  }

  showQuestion();
}

function showQuestion(){
  const q=questions[current];
  document.getElementById("question").innerText=q.q;
  const optionsDiv=document.getElementById("options");
  optionsDiv.innerHTML="";

  q.a.forEach((option,index)=>{
    const btn=document.createElement("div");
    btn.className="option";
    btn.innerText=option;
    btn.onclick=()=>checkAnswer(index,btn);
    optionsDiv.appendChild(btn);
  });
}

function checkAnswer(index,element){
  if(index===questions[current].correct){
    fillProgress();
    current++;
    setTimeout(()=>{
      if(current<questions.length){
        showQuestion();
      }else{
        document.getElementById("game").classList.add("hidden");
        document.getElementById("rewardMessage").classList.remove("hidden");
      }
    },800);
  }else{
    alert("Em nghĩ lại xem nào 💭");
  }
}

function fillProgress(){
  const percent=((current+1)/questions.length)*100;
  document.getElementById("progressBar").style.width=percent+"%";
}

function showLetter(){
  document.getElementById("rewardMessage").classList.add("hidden");
  document.getElementById("letter").classList.remove("hidden");
  setTimeout(()=>{
    document.getElementById("letterScene").classList.add("active");
  },100);

  setTimeout(()=>{
    document.getElementById("letter").classList.add("hidden");
    document.getElementById("endingScreen").classList.add("active");
  },17000); 
}
</script>
